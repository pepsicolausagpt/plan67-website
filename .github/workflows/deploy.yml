name: 🚀 Build and Deploy to Beget FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: 📦 Install dependencies
        run: npm ci || npm install
        
      - name: 🔨 Build Project
        run: npm run build
        
      - name: 🔐 Inject secrets into PHP proxy
        run: |
          sed -i "s/%%BOT_TOKEN%%/${{ secrets.VITE_TG_BOT_TOKEN }}/g" ./dist/send.php
          sed -i "s/%%CHAT_ID%%/${{ secrets.VITE_TG_CHAT_ID }}/g" ./dist/send.php
        
      - name: 📂 Sync files to Beget FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: /g93030nz.beget.tech/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
